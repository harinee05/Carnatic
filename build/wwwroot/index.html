<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Carnatic Music Raga Trainer — Visualize, practice, and perfect your pitch with real-time feedback" />
    <!-- For GitHub Pages, we need to set the base href to the repo name -->
    <base href="/Carnatic/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Carnatic.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Carnatic Raga Trainer</title>
</head>

<body>
    <div id="app">
        <!-- Loading spinner for while the WebAssembly downloads -->
        <div
            style="display: flex; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; background: #0a0a14; color: #ffb74d; font-family: sans-serif;">
            <div style="font-size: 3rem; margin-bottom: 20px; animation: rec-pulse 2s infinite;">🎵</div>
            <h2>Loading Carnatic Raga Trainer...</h2>
            <p style="color: #a0a0b8;">Downloading application to your browser...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/audioInterop.js"></script>
</body>

</html>
